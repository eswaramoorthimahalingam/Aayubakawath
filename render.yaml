services:
  - type: web
    name: aayubakwath-frontend
    runtime: static
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
    envVars:
      - key: VITE_API_BASE_URL
        value: https://aayubakwath-backend-production.up.railway.app
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
